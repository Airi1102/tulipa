<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrinho</title>
    <link rel="stylesheet" href="../styles/carrinho.css">
</head>
<body>
    <header>
        <span class="icone">🚚</span>
        <h1> Carrinho</h1>
    </header>

    <section class="produto">
        <div class="img">
            <img class="bolo-img" src="../img/img-bolochocolate.jpg" alt="Foto do bolo">
        </div>
        <div class="info">
            <span class="tag">Bolos</span>
            <p>Bolo de chocolate</p>
            <span class="preco">R$ 10,00</span>
        </div>
    </section>


    <hr>


    <div class="total">
            
        <div class="acoes">
            <p>Preço total: <strong>R$ 30,00</strong></p>
            <div class="campo-entrega">
                <label>Data de entrega:</label>
                <input type="date">
            </div>
            <a href="./pagamento.html">
                <button class="btn">Pagar</button>
            </a>
        </div>
    </div>
    
</body>
</html>
