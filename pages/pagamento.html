<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../styles/pagamento.css">
</head>
<body>
    <header>
        <h1>Pagamento</h1>
    </header>

    <main>
        <h2>Insira os dados</h2>
        <form action="URL" method="post" class="formulario">
            <div>
                <label for="nome">Nome: </label>
                <input type="text" id="nome" name="nome" required>
            </div>

            <div>
                <label for="telefone"> Telefone: </label>
                <input type="tel" id="telefone" name="tel" required>
            </div>

            <div>
                <label for="email">Email: </label>
                <input type="email" id="email" name="email" required>
            </div>

            <label for="pagamento">Forma de pagamento: </label>
            <select id="pagamento" name="formaPagamento" required>
                <option value="pix">Pix</option>
                <option value="cartão credito">Cartão de Crédito</option>
                <option value="boleto">Boleto</option>
            </select>
        </form>
        <a href="./trajeto.html">
            <button class="pagar">Pagar</button>
        </a>
    </main>
    
</body>
</html>
