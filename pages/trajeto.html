<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trajeto do pedido</title>
    <link rel="stylesheet" href="../styles/trajeto.css">
</head>
<body>
    <h1>Acompanhe seu pedido: </h1>
    <section class="pago">
        <h2>Pagamento confirmado!</h2>
        <button class="btn">Gerar comprovante</button>
    </section>
    <section class="pedido">
        <h2>Acompanhe seu pedido</h2>
        <ul class="timeline">
            <li class="etapa ">Preparação</li>
            <li class="etapa ">Embalagem</li>
            <li class="etapa ">Pedido Enviado</li>
            <li class="etapa ">Entrega</li>
        </ul>
    </section>
    <div class="alterar">
        <a href="../index.html">
            <button class="btn">Altere seu pedido</button>
        </a>
        <p class="legenda">Até dois dias antes!</p>
    </div>

    
</body>
</html>
